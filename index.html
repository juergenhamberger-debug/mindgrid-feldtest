function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function rpc(fn, params, retries) {
  var maxRetries = typeof retries === "number" ? retries : 0;
  var attempt = 0;
  function tryOnce() {
    return fetch(SB_URL + "/rest/v1/rpc/" + fn, {
      method: "POST",
      headers: { "apikey": SB_KEY, "Content-Type": "application/json", "Authorization": "Bearer " + SB_KEY },
      body: JSON.stringify(params || {})
    }).then(function(r) {
      if (r.status === 429 || r.status >= 500) {
        if (attempt < maxRetries) { attempt++; return wait(1000 * attempt).then(tryOnce); }
      }
      if (!r.ok) throw new Error("RPC " + fn + " " + r.status);
      return r.json();
    }).catch(function(err) {
      if (attempt < maxRetries) { attempt++; return wait(1000 * attempt).then(tryOnce); }
      throw err;
    });
  }
  return tryOnce();
}

// === AI PROXY mit Retry (Rate Limits + Serverfehler) ===
function callAI(chatMsgs, phase, ctx) {
  var attempt = 0;
  var maxRetries = 3;
  function tryOnce() {
    return fetch(SB_URL + "/functions/v1/ai-interview", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SB_KEY },
      body: JSON.stringify({ token: token, messages: chatMsgs, phase: phase, context: ctx })
    }).then(function(r) {
      if (r.status === 429) {
        if (attempt < maxRetries) { attempt++; console.log("[RGT] AI rate limited, retry " + attempt + "/3 in " + (2000 * attempt) + "ms"); return wait(2000 * attempt).then(tryOnce); }
      }
      if (r.status >= 500) {
        if (attempt < maxRetries) { attempt++; return wait(1500 * attempt).then(tryOnce); }
      }
      if (!r.ok) throw new Error("AI " + r.status);
      return r.json();
    }).catch(function(err) {
      if (attempt < maxRetries && String(err).indexOf("Failed to fetch") >= 0) { attempt++; return wait(2000 * attempt).then(tryOnce); }
      throw err;
    });
  }
  return tryOnce();
}

// === KONSTRUKT-CHECK A / B ===
function callCheck(checkType, newTerm, polA, existingDims) {
  return fetch(SB_URL + "/functions/v1/check-construct", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SB_KEY },
    body: JSON.stringify({
      check_type: checkType,
      new_term: newTerm,
      pol_a_term: polA || newTerm,
      pol_b_term: checkType === "pol_b" ? newTerm : "",
      existing_dimensions: existingDims,
      study_topic: study ? (study.topic || study.title || "") : "",
      elements: elements.map(function(e) { return e.label; }),
      language: L
    })
  }).then(function(r) {
    if (!r.ok) throw new Error("Check " + r.status);
    return r.json();
  }).catch(function(err) {
    console.warn("[RGT] Check failed, proceeding:", err);
    return { action: "proceed", quality_flags: {}, problem_type: null, question: null, score_contribution: 1 };
  });
}

function calcQualityScore(fA, fB, ptA, ptB) {
  var s = 0;
  // Bipolarität (Kriterium 1)
  var b = (fB && fB.bipolar) || "ok", t = (fB && fB.tautology) || "ok";
  if (b === "ok" && t === "ok" && ptB !== "P1" && ptB !== "P2") s += 2;
  else if (b !== "fail" && t !== "fail") s += 1;
  // Klarheit (Kriterium 2)
  var cA = (fA && fA.clarity) || "ok", cB = (fB && fB.clarity) || "ok";
  if (cA === "ok" && cB === "ok") s += 2; else if (cA !== "fail" && cB !== "fail") s += 1;
  // Diskriminationskraft (Kriterium 3) — Platzhalter, wird nach Rating aktualisiert
  s += 1;
  // Relevanz (Kriterium 4)
  var rA = (fA && fA.relevance) || "ok", rB = (fB && fB.relevance) || "ok";
  if (rA === "ok" && rB === "ok") s += 2; else if (rA !== "fail" && rB !== "fail") s += 1;
  // Idiografische Sprache (Kriterium 5)
  var jarg = ptA === "P5" || ptA === "P8" || ptB === "P5" || ptB === "P8";
  if (!jarg && cA !== "risk" && cB !== "risk") s += 2; else if (!jarg) s += 1;
  // Nicht-Redundanz (Kriterium 6)
  var red = (fB && fB.redundancy) || "ok";
  if (red === "ok" && ptB !== "P9") s += 2; else if (red !== "fail" && ptB !== "P9") s += 1;
  return Math.min(s, 12);
}

function scoreToFlag(score) {
  if (score >= 10) return "green";
  if (score >= 7)  return "yellow";
  if (score >= 4)  return "orange";
  return "red";
}

function saveRatingsFor(ci){
  var cc=cons[ci];if(!cc||!rats[ci]||!cc.dbId)return;

  // Monadik-Erkennung (P3): alle/fast alle Elemente gleich bewertet
  var ratVals=[];
  for(var lbl in rats[ci]){
    var p=rats[ci][lbl];
    ratVals.push(ratingMode==="scale"?p.scale:(p.y>=50?1:0));
  }
  if(ratVals.length>0&&cc.qualScore!=null){
    var uniqueVals={};for(var vi=0;vi<ratVals.length;vi++)uniqueVals[ratVals[vi]]=1;
    var distinctCount=Object.keys(uniqueVals).length;
    var isMonadic=distinctCount===1&&ratVals.length>=Math.max(2,Math.floor(elements.length*0.8));
    // Diskriminationswert (Kriterium 3): Platzhalter (1) durch echten Wert ersetzen
    var discScore=distinctCount>=3?2:(distinctCount>=2?1:0);
    var updatedScore=Math.min(12,cc.qualScore-1+discScore); // -1 Platzhalter, +echter Wert
    if(isMonadic){updatedScore=Math.max(0,updatedScore-2);} // monadisch bestraft zusätzlich
    cc.qualScore=updatedScore;cc.qualFlag=scoreToFlag(updatedScore);
    rpc("update_construct_quality",{
      p_construct_id:cc.dbId,
      p_quality_flag:cc.qualFlag,
      p_quality_score:cc.qualScore,
      p_is_monadic:isMonadic
    }).catch(function(e){console.warn("[RGT] monadic update failed:",e)});
    console.log("[RGT] Quality updated after rating: "+cc.qualFlag+" ("+cc.qualScore+"/12)"+(isMonadic?" [MONADISCH]":""));
  }

  var rd=[];if(!cc||!rats[ci]||!cc.dbId)return;
  for(var lbl in rats[ci]){var el=elements.find(function(e){return e.label===lbl});if(!el)continue;var p=rats[ci][lbl];if(ratingMode==="scale"){rd.push({construct_id:cc.dbId,element_id:el.id,tetralemma:null,pos_x:null,pos_y:null,scale_value:p.scale||5})}else{var q;if(p.y>=50&&p.x<50)q="pole_a";else if(p.y>=50&&p.x>=50)q="pole_b";else if(p.y<50&&p.x<50)q="neither";else q="both";rd.push({construct_id:cc.dbId,element_id:el.id,tetralemma:q,pos_x:p.x,pos_y:p.y})}}
  if(rd.length>0)rpc("save_ratings",{p_token:token,p_ratings:JSON.stringify(rd)},2).catch(function(e){console.warn("[RGT] saveRatingsFor failed:",e)})
}

function setupMic(inputEl, onFinal) {
  var SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SRClass || !inputEl) return;
  // Find or create mic button next to input
  var micBtn = inputEl.parentNode ? inputEl.parentNode.querySelector('.mic-btn') : null;
  if (!micBtn) return;
  micBtn.style.display = '';
  var sr = new SRClass();
  sr.lang = L === 'en' ? 'en-US' : 'de-DE';
  sr.interimResults = true;
  sr.continuous = false;
  var active = false;
  micBtn.onclick = function() { if (active) { sr.stop(); } else { try { sr.start(); } catch(e) {} } };
  sr.onstart  = function() { active = true;  micBtn.classList.add('listening'); };
  sr.onend    = function() { active = false; micBtn.classList.remove('listening'); };
  sr.onerror  = function() { active = false; micBtn.classList.remove('listening'); };
  sr.onresult = function(e) {
    var txt = ''; for (var i = e.resultIndex; i < e.results.length; i++) txt += e.results[i][0].transcript;
    inputEl.value = txt;
    inputEl.dispatchEvent(new Event('input', {bubbles:true}));
    if (e.results[e.results.length-1].isFinal) { sr.stop(); setTimeout(function() { if (onFinal) onFinal(); }, 300); }
  };
}

// ===== ACTIONS =====
function doConfirmSel(){
  var te=getTriadEls(),sim=sel.map(function(id){return elements.find(function(e){return e.id===id})}),dif=te.filter(function(e){return sel.indexOf(e.id)<0});
  cur={a:"",b:"",lad:[],ladCount:0,plausCount:0,clarifyCount:0,origA:"",origB:"",checkADone:false,checkBDone:false,checkAFlags:null,checkBFlags:null,checkAProblem:null,checkBProblem:null,checkAScore:1,checkBScore:1,clarificationAsked:false};
  var isDyad=elicitMode==="dyad";
  if(isAI()){
    msgs=[];sending=true;render();
    callAI([],isDyad?"dyad_elicit":"elicit",buildCtx()).then(function(resp){sending=false;msgs=[{r:"ai",t:resp.text}];logChat("ai",resp.text,"elicit");currentView="elicit";render()}).catch(function(){sending=false;msgs=[{r:"ai",t:isDyad?tx("dyadQ"):tx("elicit",{a:sim[0].label,b:sim[1]?sim[1].label:"",c:dif[0]?dif[0].label:""})}];currentView="elicit";render()});
  } else {
    if(isDyad){msgs=[{r:"ai",t:tx("dyadQ")+' <b>'+sim[0].label+'</b> vs. <b>'+(te.length>1?te.filter(function(e){return e.id!==sel[0]})[0].label:"")+'</b>'}]}
    else{msgs=[{r:"ai",t:tx("elicit",{a:sim[0].label,b:sim[1]?sim[1].label:"",c:dif[0]?dif[0].label:""})}]}
    currentView="elicit";render();
  }
  rpc("update_progress",{p_token:token,p_phase:"elicit"}).catch(function(){});
}

function doSend(){
  var inp=document.getElementById("chat-inp");if(!inp||!inp.value.trim()||sending)return;
  var v=inp.value.trim();inp.value="";msgs.push({r:"user",t:v});logChat("user",v,currentView);

  // === CHECK A (elicit, erste Eingabe) ===
  if(currentView==="elicit"&&!cur.checkADone){
    cur.origA=v;
    var exDims=cons.map(function(c){return{pol_a:c.a,pol_b:c.b}});
    sending=true;render();
    callCheck("pol_a",v,v,exDims).then(function(chk){
      sending=false;
      cur.checkAFlags=chk.quality_flags;cur.checkAProblem=chk.problem_type;cur.checkAScore=chk.score_contribution||1;
      cur.checkADone=true;
      if(chk.action==="clarify"&&chk.question){
        cur.a=v;cur.clarificationAsked=true;
        msgs.push({r:"ai",t:chk.question});currentView="check_clarify_a";render();
      } else {
        if(isAI())doSendAI(v);else doSendTpl(v);
      }
    });
    return;
  }

  // After check_clarify_b: cur.b already saved, just confirm
  if(currentView==="check_clarify_b"&&cur.b){
    // The clarification answer is noted but cur.b stays as first opp answer
    if(v.trim().length>1&&v.trim().length<cur.b.length*3){cur.b=v;} // only override if shorter/clearer
    currentView="confirm";render();return;
  }

  // === CHECK B (opp, erste Eingabe) ===
  if(currentView==="opp"&&!cur.checkBDone){
    cur.origB=v;
    var exDims=cons.map(function(c){return{pol_a:c.a,pol_b:c.b}});
    sending=true;render();
    callCheck("pol_b",v,cur.a,exDims).then(function(chk){
      sending=false;
      cur.checkBFlags=chk.quality_flags;cur.checkBProblem=chk.problem_type;cur.checkBScore=chk.score_contribution||1;
      cur.checkBDone=true;
      if(chk.action==="clarify"&&chk.question){
        cur.b=v;cur.clarificationAsked=true;
        msgs.push({r:"ai",t:chk.question});currentView="check_clarify_b";render();
      } else {
        if(isAI())doSendAI(v);else doSendTpl(v);
      }
    });
    return;
  }

  if(isAI())doSendAI(v);else doSendTpl(v);
}

// TEMPLATE MODE
function doSendTpl(v){
  // Nach Check A Klärung: clarifizierten Begriff übernehmen, weiter
  if(currentView==="check_clarify_a"){
    cur.a=v;
    if(ladderRounds>0){msgs.push({r:"ai",t:tx("ladder",{v:v})});currentView="ladder";cur.ladCount=0}
    else{msgs.push({r:"ai",t:tx("opposite",{v:v})});currentView="opp"}
    render();return;
  }
  // Nach Check B Klärung: clarifizierten Begriff übernehmen, weiter
  if(currentView==="check_clarify_b"){
    cur.b=v;currentView="confirm";render();return;
  }
  if(currentView==="elicit"){cur.a=v;if(v.split(/\s+/).length<3){msgs.push({r:"ai",t:tx("plaus",{v:v})});currentView="plaus"}else if(ladderRounds>0){msgs.push({r:"ai",t:tx("ladder",{v:v})});currentView="ladder";cur.ladCount=0}else{msgs.push({r:"ai",t:tx("opposite",{v:v})});currentView="opp"}}
  else if(currentView==="plaus"){cur.a=v;if(ladderRounds>0){msgs.push({r:"ai",t:tx("ladder",{v:v})});currentView="ladder";cur.ladCount=0}else{msgs.push({r:"ai",t:tx("opposite",{v:v})});currentView="opp"}}
  else if(currentView==="ladder"){cur.lad.push(v);cur.ladCount++;if(cur.ladCount<ladderRounds){msgs.push({r:"ai",t:tx("ladder",{v:v})})}else{msgs.push({r:"ai",t:tx("opposite",{v:cur.a})});currentView="opp"}}
  else if(currentView==="opp"){if(!cur.b)cur.b=v;currentView="confirm"}
  else if(currentView==="fixed"){doHandleFixed(v);return}
  render();
}

// AI MODE
function doSendAI(v){
  // Nach Check A Klärung im AI-Modus: Begriff übernehmen, AI-Call fortsetzen
  if(currentView==="check_clarify_a"){
    cur.a=v;
    sending=true;render();
    callAI(msgs,"elicit",buildCtx()).then(function(resp){
      sending=false;var act=resp.action||"continue",txt=resp.text||"",dat=resp.data||{};
      logChat("ai",txt,"elicit");
      if(act==="accept_pole_a"||act==="continue"){if(dat.emergent_pole)cur.a=dat.emergent_pole;msgs.push({r:"ai",t:txt||tx("opposite",{v:cur.a})});if(ladderRounds>0&&cur.ladCount<ladderRounds)currentView="ladder";else currentView="opp"}
      else{msgs.push({r:"ai",t:txt});if(ladderRounds>0)currentView="ladder";else currentView="opp"}
      render();
    }).catch(function(){sending=false;msgs.push({r:"ai",t:tx("opposite",{v:cur.a})});currentView="opp";render()});
    return;
  }
  // Nach Check B Klärung: Begriff übernehmen, confirm
  if(currentView==="check_clarify_b"){
    cur.b=v;currentView="confirm";render();return;
  }
  if(currentView==="elicit"||currentView==="plaus")cur.a=v;
  else if(currentView==="ladder")cur.lad.push(v);
  sending=true;render();
  callAI(msgs,currentView,buildCtx()).then(function(resp){
    sending=false;var act=resp.action||"continue",txt=resp.text||"",dat=resp.data||{};
    logChat("ai",txt,currentView);
    if(act==="accept_pole_a"){if(dat.emergent_pole)cur.a=dat.emergent_pole;else if(!cur.a)cur.a=v;msgs.push({r:"ai",t:txt});if(ladderRounds>0&&cur.ladCount<ladderRounds)currentView="ladder";else currentView="opp"}
    else if(act==="plausibility_check"){cur.plausCount++;msgs.push({r:"ai",t:txt});if(cur.plausCount>=3){if(!cur.a)cur.a=v;currentView=ladderRounds>0?"ladder":"opp"}else currentView="plaus"}
    else if(act==="clarify"){cur.clarifyCount++;msgs.push({r:"ai",t:txt});if(cur.clarifyCount>=3){if(currentView==="elicit"||currentView==="plaus"){if(!cur.a)cur.a=v;currentView=ladderRounds>0?"ladder":"opp"}else if(currentView==="opp"){if(!cur.b)cur.b=v;currentView="confirm"}}}
    else if(act==="continue_ladder"){cur.ladCount++;if(dat.laddering_note)cur.lad.push(dat.laddering_note);msgs.push({r:"ai",t:txt});if(cur.ladCount>=ladderRounds){msgs.push({r:"ai",t:tx("opposite",{v:cur.a})});currentView="opp"}else{currentView="ladder"}}
    else if(act==="ask_opposite"){if(dat.laddering_note)cur.lad.push(dat.laddering_note);if(dat.emergent_pole)cur.a=dat.emergent_pole;msgs.push({r:"ai",t:txt});currentView="opp"}
    else if(act==="extract_construct"){if(dat.emergent_pole)cur.a=dat.emergent_pole;cur.b=dat.implicit_pole||v;if(txt)msgs.push({r:"ai",t:txt});currentView="confirm"}
    else if(act==="clarify_opposite"){cur.clarifyCount++;msgs.push({r:"ai",t:txt});if(cur.clarifyCount>=3){currentView="confirm"}else currentView="opp"}
    else{if(txt)msgs.push({r:"ai",t:txt});if(currentView==="ladder"){cur.ladCount++;if(cur.ladCount>=ladderRounds){msgs.push({r:"ai",t:tx("opposite",{v:cur.a})});currentView="opp"}}}
    render();
  }).catch(function(err){console.error("AI err:",err);sending=false;doSendTpl(v)});
}

function doHandleFixed(v){
  var fd=fixedParsed[fdI];
  if(isAI()){sending=true;render();callAI(msgs,"fixed",buildCtx()).then(function(resp){sending=false;if(resp.action==="extract_construct")saveFixed(fd,(resp.data&&resp.data.implicit_pole)||v);else if(resp.action==="clarify_opposite"){cur.clarifyCount++;if(cur.clarifyCount>=3){saveFixed(fd,v)}else{msgs.push({r:"ai",t:resp.text});render()}}else saveFixed(fd,v)}).catch(function(){sending=false;saveFixed(fd,v)})}
  else saveFixed(fd,v);
}
function saveFixed(fd,pB){var nc={a:fd.pole,b:pB,src:"fixed",id:fd.id};var saveParams={p_token:token,p_element_set_id:sets[0]?sets[0].id:null,p_pole_a:fd.pole,p_pole_b:pB,p_is_fixed:true,p_position:cons.length};nc._saveParams=saveParams;rpc("save_construct",saveParams,3).then(function(r){if(r&&r.construct_id){nc.dbId=r.construct_id;console.log("[RGT] Fixed construct saved:",r.construct_id)}}).catch(function(e){console.warn("[RGT] saveFixed failed, will retry at finish:",e)});cons.push(nc);rCI=cons.length-1;fdI++;nextAfterRate=fdI<fixedParsed.length?"nextfixed":"finish";rpc("update_progress",{p_token:token,p_phase:"rate"}).catch(function(){});currentView="rate";render()}

function doConfirmPair(){
  // Qualitätsscore berechnen
  var qScore=calcQualityScore(cur.checkAFlags,cur.checkBFlags,cur.checkAProblem,cur.checkBProblem);
  var qFlag=scoreToFlag(qScore);
  var nc={a:cur.a,b:cur.b,src:"elicit",id:"c"+cons.length,
    origA:cur.origA||cur.a,origB:cur.origB||cur.b,
    qualScore:qScore,qualFlag:qFlag,
    checkAFlags:cur.checkAFlags,checkBFlags:cur.checkBFlags,
    checkAProblem:cur.checkAProblem,checkBProblem:cur.checkBProblem,
    clarificationAsked:cur.clarificationAsked};
  var te=getTriadEls(),difEl=te.filter(function(e){return sel.indexOf(e.id)<0})[0];
  var saveParams={p_token:token,p_element_set_id:sets[tIdx].id,p_pole_a:cur.a,p_pole_b:cur.b,p_similar_ids:JSON.stringify(sel),p_different_id:difEl?difEl.id:null,p_is_fixed:false,p_position:cons.length,p_laddering_notes:cur.lad&&cur.lad.length>0?JSON.stringify(cur.lad):null};
  nc._saveParams=saveParams;
  rpc("save_construct",saveParams,3).then(function(r){
    if(r&&r.construct_id){
      nc.dbId=r.construct_id;
      console.log("[RGT] Construct saved:",r.construct_id,"quality:",qFlag,qScore);
      rpc("update_construct_quality",{
        p_construct_id:r.construct_id,
        p_quality_flag:nc.qualFlag,
        p_quality_score:nc.qualScore,
        p_quality_flags_a:nc.checkAFlags?JSON.stringify(nc.checkAFlags):null,
        p_quality_flags_b:nc.checkBFlags?JSON.stringify(nc.checkBFlags):null,
        p_original_term_a:nc.origA,
        p_elicited_term_a:nc.a,
        p_original_term_b:nc.origB,
        p_elicited_term_b:nc.b,
        p_problem_type_a:nc.checkAProblem,
        p_problem_type_b:nc.checkBProblem,
        p_clarification_asked:nc.clarificationAsked,
        p_is_monadic:false
      }).catch(function(e){console.warn("[RGT] update_construct_quality failed:",e)});
    }
  }).catch(function(e){console.warn("[RGT] save_construct failed, will retry at finish:",e)});
  cons.push(nc);round++;
  if(round<maxCon&&tIdx+1<sets.length)nextAfterRate="triad";else if(fixedParsed.length>0)nextAfterRate="fixed";else nextAfterRate="finish";
  rCI=cons.length-1;rpc("update_progress",{p_token:token,p_phase:"rate"}).catch(function(){});currentView="rate";render();
}

function doFinish(){
  // Phase 1: Fehlende Konstrukte nachspeichern (3 Retries)
  var unsaved=cons.filter(function(c){return !c.dbId&&c._saveParams});
  if(unsaved.length>0)console.log("[RGT] Retrying "+unsaved.length+" unsaved constructs...");
  var retryPromises=unsaved.map(function(c){
    return rpc("save_construct",c._saveParams,3).then(function(r){
      if(r&&r.construct_id){c.dbId=r.construct_id;console.log("[RGT] Retry succeeded:",r.construct_id)}
    }).catch(function(e){console.error("[RGT] Construct permanently lost:",c.a,"↔",c.b,e)})
  });
  Promise.all(retryPromises).then(function(){
    // Phase 2: Ratings sammeln (nur für Konstrukte mit dbId)
    var rd=[];var skipped=0;
    for(var ci=0;ci<cons.length;ci++){if(!rats[ci])continue;var c=cons[ci];
      if(!c.dbId){skipped++;continue}
      for(var lbl in rats[ci]){var el=elements.find(function(e){return e.label===lbl});if(!el)continue;var p=rats[ci][lbl],q;
      if(ratingMode==="scale"){rd.push({construct_id:c.dbId,element_id:el.id,tetralemma:null,pos_x:null,pos_y:null,scale_value:p.scale||5})}
      else{if(p.y>=50&&p.x<50)q="pole_a";else if(p.y>=50&&p.x>=50)q="pole_b";else if(p.y<50&&p.x<50)q="neither";else q="both";rd.push({construct_id:c.dbId,element_id:el.id,tetralemma:q,pos_x:p.x,pos_y:p.y})}}}
    if(skipped>0)console.warn("[RGT] Skipped ratings for "+skipped+" constructs without dbId");
    var dur=Math.round((Date.now()-startTime)/1000);
    // Phase 3: Ratings + Complete speichern (mit Retry)
    var p1=rd.length>0?rpc("save_ratings",{p_token:token,p_ratings:JSON.stringify(rd)},2).catch(function(e){console.error("[RGT] save_ratings failed:",e)}):Promise.resolve();
    p1.then(function(){
      rpc("complete_interview",{p_token:token,p_duration_seconds:dur},2).catch(function(e){console.error("[RGT] complete_interview failed:",e)});
    });
    if(hbInterval){clearInterval(hbInterval);hbInterval=null}
    var postItems=qqItems.filter(function(q){return q.phase==="post"});
    if(postItems.length>0){currentView="post_q";render()}
    else{doShowThanks()}
  });
}
function doShowThanks(){currentView="thanks";render()}

// ===== INIT =====
if(!token){currentView="error";render()}
else{
  // Immediately mark as opened for tracking
  rpc("mark_opened",{p_token:token},2).catch(function(){});

  rpc("get_session",{p_token:token},3).then(function(data){
  if(data.error){currentView="error";render();return}
  session=data;study=data.study;elements=data.elements||[];sets=data.sets||[];
  participant=data.participant||{};
  qqItems=data.questionnaire_items||[];
  redirectUrl=study.redirect_url||null;

  try{var fd=typeof study.fixed_dimensions==="string"?JSON.parse(study.fixed_dimensions):(study.fixed_dimensions||[]);fixedParsed=fd.map(function(f,i){return{id:"fd"+i,pole:f.split(" \u2194 ")[0]}})}catch(e){fixedParsed=[]}
  maxCon=study.max_construct_pairs||5;ladderRounds=study.laddering_rounds||0;ratingMode=study.rating_mode||"tetralemma";
  elicitMode=study.elicitation_mode||"triad";selMode=study.selection_mode||"select_two";
  if(study.language==="en")L="en";
  aiCfg.textMode=study.ai_text_mode||"template";aiCfg.behaviorMode=study.ai_behavior_mode||"mechanical";
  aiCfg.crossRef=study.ai_cross_ref||"none";aiCfg.crossFreq=study.ai_cross_freq||"mid";
  aiCfg.tone=study.ai_tone||"formal";aiCfg.ladderDir=study.laddering_direction||"up";

  // Resume: restore existing constructs + ratings
  var existCons=data.existing_constructs||[];
  var existRats=data.existing_ratings||[];
  if(existCons.length>0){
    console.log("[RGT] Resuming: "+existCons.length+" constructs, "+existRats.length+" ratings");
    existCons.forEach(function(ec){
      cons.push({a:ec.pole_a,b:ec.pole_b,src:ec.is_fixed?"fixed":"elicit",id:ec.id,dbId:ec.id});
    });
    round=cons.filter(function(c){return c.src==="elicit"}).length;
    tIdx=Math.min(round,sets.length-1);
    // Restore ratings grouped by construct
    existRats.forEach(function(er){
      var ci=cons.findIndex(function(c){return c.dbId===er.construct_id||c.id===er.construct_id});
      if(ci<0)return;
      if(!rats[ci])rats[ci]={};
      var elObj=elements.find(function(e){return e.id===er.element_id});
      if(!elObj)return;
      if(ratingMode==="scale"){rats[ci][elObj.label]={scale:er.scale_value,x:er.pos_x||50,y:50}}
      else{rats[ci][elObj.label]={x:er.pos_x||50,y:er.pos_y||50}}
    });
    rCI=cons.length-1;
  }

  // Start tracking
  startHeartbeat();
  setupAbandon();

  console.log("[RGT] AI:",aiCfg.behaviorMode,"| Ladder:",ladderRounds,"| CrossRef:",aiCfg.crossRef,"| Mode:",elicitMode,"| Rating:",ratingMode,"| Resume:",existCons.length);

  // Determine start view
  if(participant.status==="done"){currentView="thanks"}
  else if(existCons.length>0){
    // Check if last construct has ratings — if not, resume at rating
    var lastC=cons[cons.length-1];
    var lastHasRatings=lastC&&rats[cons.length-1]&&Object.keys(rats[cons.length-1]).length>0;
    var allRatedCount=cons.filter(function(c,i){return rats[i]&&Object.keys(rats[i]).length>=elements.length}).length;
    if(allRatedCount<cons.length){
      // Some constructs have no or incomplete ratings — resume at rating
      rCI=allRatedCount;
      // Set nextAfterRate correctly
      if(round<maxCon&&tIdx<sets.length)nextAfterRate="triad";
      else if(fixedParsed.length>0&&cons.filter(function(c){return c.src==="fixed"}).length<fixedParsed.length)nextAfterRate="fixed";
      else nextAfterRate="finish";
      currentView="rate";
      msgs.push({r:"ai",t:tx("resumeInfo")});
    } else if(round<maxCon&&tIdx<sets.length){
      triadReady=false;currentView="triad_chat";
      msgs.push({r:"ai",t:tx("resumeInfo")});
    } else if(fixedParsed.length>0&&cons.filter(function(c){return c.src==="fixed"}).length<fixedParsed.length){
      fdI=cons.filter(function(c){return c.src==="fixed"}).length;
      msgs=[{r:"ai",t:tx("fixedP",{p:fixedParsed[fdI].pole})}];currentView="fixed";
    } else{currentView="thanks"}
  }
  else{currentView="welcome"}
  render();
}).catch(function(e){console.error("Init:",e);currentView="error";render()})}
</script>
